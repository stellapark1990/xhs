<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中国非遗 · 千灯夜明</title>
  <!-- 更换为极速稳定的 cdnjs 源 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&display=swap');

    :root {
      --bg-dark: #05070a;        
      --gold-light: #fceabb;     
      --gold-dim: #a68c5b;       
      --glow-color: rgba(252, 234, 187, 0.4); 
      --river-blue: #5ca0d3;     
      --marker-scale: 0.6;       
    }

    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; background:var(--bg-dark); }
    body { font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif; color:var(--gold-light); font-weight: 300; }

    #map { position:fixed; inset:0; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib, .maplibregl-ctrl-top-right, .maplibregl-ctrl-bottom-left, .maplibregl-ctrl-bottom-right { display:none!important; }

    #stars {
      position:fixed; inset:0; z-index:2; pointer-events:none;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.15; mix-blend-mode: screen; animation: drift 150s linear infinite;
    }
    #fog {
      position:fixed; bottom:0; left:0; width:100%; height:30vh; z-index:3; pointer-events:none;
      background: linear-gradient(to top, rgba(252, 234, 187, 0.05) 0%, transparent 100%);
    }
    @keyframes drift { 0% { background-position: 0 0; } 100% { background-position: 1000px 500px; } }

    #loading {
      position:fixed; inset:0; z-index:9000; background: var(--bg-dark);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #loading.out { opacity:0; pointer-events:none; }
    .ld-ink { width:40px; height:40px; border-radius:50%; background:var(--gold-light); filter:blur(15px); animation:inkSpread 3s cubic-bezier(0.2, 0.8, 0.2, 1) infinite; }
    @keyframes inkSpread { 0% { transform:scale(0.1); opacity:1; } 100% { transform:scale(4); opacity:0; } }

    .g-panel {
      background: rgba(5, 7, 10, 0.7); backdrop-filter: blur(12px);
      border: 1px solid rgba(252, 234, 187, 0.1); color: var(--gold-light); border-radius: 2px;
    }

    #hdr { position:fixed; top:40px; left:40px; z-index:500; display:flex; align-items:flex-start; gap:20px; pointer-events:none; }
    .h-zh { writing-mode:vertical-rl; font-size:36px; letter-spacing:12px; line-height: 1; font-weight: 400; opacity: 0.9; }
    .h-en { writing-mode:vertical-rl; font-size:10px; color:var(--gold-dim); letter-spacing:6px; font-family: sans-serif; text-transform: uppercase; margin-top: 5px; opacity: 0.6; }
    .h-line { width: 1px; height: 120px; background: linear-gradient(to bottom, var(--gold-light), transparent); opacity: 0.3; margin-top: 10px; }

    #zbadge { position:fixed; top:30px; right:30px; z-index:600; padding:8px 16px; font-size:12px; letter-spacing:6px; pointer-events:none; opacity: 0.8; }
    
    #leg { position:fixed; bottom:140px; right:30px; z-index:600; padding:20px; }
    .lgt { font-size:13px; font-weight:300; border-bottom:1px solid rgba(252,234,187,0.2); padding-bottom:10px; margin-bottom:15px; letter-spacing:4px; text-align:center; color:var(--gold-dim); pointer-events:none; }
    
    .lgr { display:flex; align-items:center; gap:12px; font-size:12px; margin-top:15px; letter-spacing:2px; font-weight: 300; cursor: pointer; transition: all 0.3s ease; opacity: 0.9; }
    .lgr:hover { opacity: 1; text-shadow: 0 0 8px rgba(252,234,187,0.5); }
    .lgr.off { opacity: 0.3; filter: grayscale(100%); text-shadow: none; }
    
    .lgd-lantern { width:8px; height:18px; border:1px solid var(--gold-light); background:rgba(252,234,187,0.1); box-shadow:0 0 5px var(--gold-light); }
    .lgd-river { width:16px; height:2px; background:var(--river-blue); box-shadow:0 0 6px var(--river-blue); }
    .lgd-light { width:6px; height:6px; border-radius:50%; background:#ff7b00; box-shadow:0 0 6px #ff7b00; }

    .t-wrap { position: relative; display: flex; align-items: center; cursor: help; }
    .t-icon { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--gold-dim); font-size: 10px; display: flex; align-items: center; justify-content: center; color: var(--gold-dim); transition: all 0.3s; margin-left: 2px; }
    .t-wrap:hover .t-icon { color: var(--bg-dark); background: var(--gold-light); border-color: var(--gold-light); }
    
    .t-box { position: absolute; bottom: 25px; right: -10px; width: 220px; background: rgba(5,7,10,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(252,234,187,0.2); border-radius: 4px; padding: 12px; font-size: 12px; color: var(--gold-light); line-height: 1.8; opacity: 0; pointer-events: none; transform: translateY(10px); transition: all 0.4s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.8); text-shadow: none; font-weight: 300; text-align: justify; }
    .t-wrap:hover .t-box { opacity: 1; transform: translateY(0); }

    #ctls { position:fixed; right:30px; top:90px; display:flex; flex-direction:column; gap:8px; z-index:600; }
    .cb { width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; transition:all 0.3s; font-size:18px; opacity: 0.6; }
    .cb:hover { opacity: 1; background: rgba(252, 234, 187, 0.1); border-color:var(--gold-light); }

    #filterbar { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:600; padding:12px 24px; display:flex; flex-direction:column; gap:12px; border-top: 1px solid rgba(252, 234, 187, 0.1); border-bottom: 1px solid rgba(252, 234, 187, 0.1); border-left: none; border-right: none; border-radius: 0; background: rgba(5,7,10,0.8); }
    .fb-row { display:flex; align-items:center; gap:15px; flex-wrap:nowrap; overflow-x:auto; }
    .fb-row::-webkit-scrollbar { display:none; }
    .fb-label { font-size:12px; letter-spacing:4px; color:var(--gold-dim); }
    .fb-pill { padding:4px 12px; border:1px solid rgba(252,234,187,0.15); font-size:12px; color:var(--gold-dim); cursor:pointer; transition:all 0.3s ease; white-space:nowrap; letter-spacing:2px; background: transparent; border-radius: 2px; }
    .fb-pill:hover { border-color:var(--gold-light); color:var(--gold-light); }
    .fb-pill.active { background: rgba(252,234,187,0.1); color:var(--gold-light); border-color:var(--gold-light); }

    .hm { cursor:pointer; z-index: 1; }
    .hm-scale { transform: scale(var(--marker-scale)); transform-origin: bottom center; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes lanternFloat { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-8px); } }
    @keyframes pinIn { 0% { opacity:0; transform: translateY(20px); } 100% { opacity:1; transform: translateY(0); } }

    .hm-pin { display:flex; flex-direction:column; align-items:center; transform-origin:bottom center; animation: lanternFloat 6s ease-in-out infinite, pinIn 0.8s cubic-bezier(0.2,0.8,0.2,1); }
    
    .lantern-body { width: 36px; height: 130px; background: rgba(252, 234, 187, 0.03); backdrop-filter: blur(4px); border: 1px solid rgba(252, 234, 187, 0.2); border-radius: 1px; box-shadow: 0 0 15px var(--glow-color), inset 0 0 10px rgba(252, 234, 187, 0.05); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px 0; transition: all 0.4s ease; position: relative; }
    .lantern-body::after { content: ''; position:absolute; bottom: -30px; width: 1px; height: 30px; background: linear-gradient(to bottom, rgba(252, 234, 187, 0.4), transparent); }
    .hm-pin:hover .lantern-body { transform: translateY(-5px); border-color: rgba(252, 234, 187, 0.6); box-shadow: 0 0 25px var(--glow-color), inset 0 0 15px rgba(252, 234, 187, 0.1); background: rgba(252, 234, 187, 0.08); }
    .l-emoji { font-size: 16px; opacity: 0.6; margin-bottom: 12px; filter: grayscale(40%); }
    .l-name { writing-mode: vertical-rl; font-size: 13px; color: var(--gold-light); letter-spacing: 5px; font-weight: 300; opacity: 0.9; }

    #fly-overlay { position: fixed; inset: 0; z-index: 2000; pointer-events: none; background: rgba(5, 7, 10, 0); backdrop-filter: blur(0px); transition: background 0.8s ease, backdrop-filter 0.8s ease; display: flex; align-items: center; justify-content: center; }
    #fly-overlay.active { pointer-events: all; background: rgba(5, 7, 10, 0.85); backdrop-filter: blur(12px); }
    #hero-lantern { position: absolute; transform-origin: center center; opacity: 0; transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
    #hero-lantern.flying { opacity: 1; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) scale(1) !important; }
    .hero-card { width: 380px; max-height: 85vh; background: rgba(10, 12, 16, 0.85); border: 1px solid rgba(252, 234, 187, 0.2); box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(252, 234, 187, 0.05); display: flex; flex-direction: column; overflow: hidden; position: relative; border-radius: 2px; }
    .hero-close { position: absolute; top: 15px; right: 15px; width: 30px; height: 30px; border: 1px solid var(--gold-dim); color: var(--gold-dim); font-weight: 300; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: all 0.3s; border-radius: 50%; background: rgba(0,0,0,0.3); }
    .hero-close:hover { color: var(--gold-light); border-color: var(--gold-light); transform: rotate(90deg); }
    .hc-photo-wrap { height: 200px; position: relative; border-bottom: 1px solid rgba(252, 234, 187, 0.1); background: rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; }
    .hc-photo-fallback { font-size: 60px; opacity: 0.3; filter: grayscale(100%); }
    .hc-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.5s; }
    .hero-card:hover .hc-photo { opacity: 1; }
    .hc-info { padding: 35px 30px; display: flex; flex-direction: column; gap: 15px; }
    .hc-top { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(252, 234, 187, 0.1); padding-bottom: 15px; }
    .hc-name { font-size: 28px; color: var(--gold-light); letter-spacing: 6px; font-weight: 400; line-height: 1.2; }
    .hc-cat { font-size: 11px; color: var(--gold-dim); letter-spacing: 4px; writing-mode: vertical-rl; margin-bottom: 5px; }
    .hc-region { font-size: 12px; color: var(--gold-dim); letter-spacing: 4px; margin-top: 5px; }
    .hc-desc { font-size: 13px; line-height: 2.2; color: #ccc; text-align: justify; font-weight: 300; opacity: 0.9; margin-top: 10px; }
    .hc-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
    .hc-tag { font-size: 11px; padding: 2px 0; color: var(--gold-dim); letter-spacing: 2px; position: relative; }
    .hc-tag:not(:last-child)::after { content: '/'; position: absolute; right: -8px; color: rgba(252, 234, 187, 0.2); }
  </style>
</head>
<body>
<div id="map"></div>
<div id="stars"></div>
<div id="fog"></div>

<div id="loading">
  <div class="ld-ink"></div>
  <div style="font-size:24px; letter-spacing:15px; margin-top:20px; font-weight:300;">千灯夜明</div>
</div>

<div id="hdr">
  <div class="h-zh">中国非遗文化</div>
  <div style="display:flex; flex-direction:column; align-items:center;">
    <div class="h-en">Heritage</div>
    <div class="h-line"></div>
  </div>
</div>

<div id="zbadge" class="g-panel"><span id="zlbl">九州大观</span></div>

<div id="leg" class="g-panel">
  <div class="lgt">人文图鉴</div>
  <div class="lgr" style="cursor: default;">
    <div class="lgd-lantern"></div>非遗
    <div class="t-wrap">
      <div class="t-icon">?</div>
      <div class="t-box" style="width: 200px;"><b>自由视角</b><br><br>长按<b>鼠标右键拖拽，即可全方位360度旋转、倾斜地图，沉浸式游览。</div>
    </div>
  </div>
  <div class="lgr" id="toggle-river">
    <div class="lgd-river"></div>华夏水脉
    <div class="t-wrap">
      <div class="t-icon">?</div>
      <div class="t-box"><b>万里长江与九曲黄河</b><br><br>文明的血脉。千年江河之水，孕育了沿岸无数璀璨的非遗瑰宝。河流形态按真实走向勾勒，由细至宽奔流入海。</div>
    </div>
  </div>
  <div class="lgr" id="toggle-light">
    <div class="lgd-light"></div>薪火聚落
    <div class="t-wrap">
      <div class="t-icon">?</div>
      <div class="t-box"><b>万家灯火，生生不息</b><br><br>以非遗发源地为核心，在大地上散落的万家灯火。象征着高雅的非遗文化皆源于民间烟火，受百姓世代守护。</div>
    </div>
  </div>
</div>

<div id="ctls">
  <div class="cb g-panel" id="c-in" title="放大">＋</div>
  <div class="cb g-panel" id="c-out" title="缩小">－</div>
  <div class="cb g-panel" id="c-rst" title="重置">⌂</div>
  <div class="cb g-panel" id="c-tlt" title="视角">⛰</div>
</div>

<div id="filterbar" class="g-panel">
  <div class="fb-row">
    <div class="fb-label">归类</div>
    <div class="fb-pill active" data-filter="cat" data-val="">大象无形</div>
    <div class="fb-pill" data-filter="cat" data-val="performance">表演艺术</div>
    <div class="fb-pill" data-filter="cat" data-val="craft">传统技艺</div>
    <div class="fb-pill" data-filter="cat" data-val="folklore">民俗信仰</div>
    <div class="fb-pill" data-filter="cat" data-val="dance">传统舞蹈</div>
  </div>
  <div class="fb-row">
    <div class="fb-label">分野</div>
    <div class="fb-pill active" data-filter="area" data-val="">神州大地</div>
    <div class="fb-pill" data-filter="area" data-val="华北">华北</div>
    <div class="fb-pill" data-filter="area" data-val="华东">华东</div>
    <div class="fb-pill" data-filter="area" data-val="华中">中原</div>
    <div class="fb-pill" data-filter="area" data-val="华南">岭南</div>
    <div class="fb-pill" data-filter="area" data-val="西南">西南</div>
    <div class="fb-pill" data-filter="area" data-val="西北">塞外</div>
    <div class="fb-pill" data-filter="area" data-val="东北">白山</div>
  </div>
</div>

<div id="fly-overlay">
  <div id="hero-lantern">
    <div class="hero-card">
      <div class="hero-close" id="hc-close">×</div>
      <div class="hc-photo-wrap">
        <div class="hc-photo-fallback" id="hc-emoji"></div>
        <img class="hc-photo" id="hc-img" src="" alt="" style="display:none;">
      </div>
      <div class="hc-info">
        <div class="hc-top">
          <div class="hc-name" id="hc-name"></div>
          <div class="hc-cat" id="hc-cat"></div>
        </div>
        <div class="hc-region" id="hc-region"></div>
        <div class="hc-desc" id="hc-desc"></div>
        <div class="hc-tags" id="hc-tags"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CAT_LABEL = { performance:'表演艺术', craft:'传统技艺', folklore:'民俗信仰', dance:'传统舞蹈' };

/* 完整数据 */
const HERITAGE = [
  {id:'jingju',name:'京剧',region:'北京',area:'华北',cat:'performance',lon:116.40,lat:39.90,emoji:'🎭',img:'',desc:'京剧是中国最具代表性的戏曲剧种，综合了唱、念、做、打四种表演形式。以精致华美的脸谱、戏服和头饰闻名于世，被誉为"国粹"。',tags:['UNESCO','戏曲','脸谱']},
  {id:'kunqu',name:'昆曲',region:'江苏·苏州',area:'华东',cat:'performance',lon:120.62,lat:31.30,emoji:'🎵',img:'',desc:'昆曲是中国现存最古老的剧种之一，发源于明代苏州昆山，以柔美婉转的唱腔、典雅精致的舞台表演著称。被誉为"百戏之祖"。',tags:['UNESCO','百戏之祖','吴文化']},
  {id:'guqin',name:'古琴艺术',region:'湖北·武汉',area:'华中',cat:'performance',lon:114.31,lat:30.59,emoji:'🎼',img:'',desc:'古琴是中国最古老的弹拨乐器之一，有逾三千年历史。古琴演奏兼具音乐与哲学意境，与文人雅士的精神世界紧密相连。',tags:['UNESCO','七弦琴','文人乐']},
  {id:'tibetan-opera',name:'藏戏',region:'西藏·拉萨',area:'西南',cat:'performance',lon:91.10,lat:29.65,emoji:'🎪',img:'',desc:'藏戏是西藏最具代表性的戏曲形式，已有六百余年历史。演员身着传统服饰演出，融合宗教故事、民间传说，唱腔高亢激越。',tags:['UNESCO','阿吉拉姆','面具艺术']},
  {id:'jianzhi',name:'剪纸',region:'陕西',area:'西北',cat:'craft',lon:108.94,lat:34.27,emoji:'✂️',img:'',desc:'中国剪纸是一种在纸上剪刻图案的民间艺术，有逾两千年历史。图案多取材于自然、传说和吉祥寓意。广泛用于节日装饰。',tags:['UNESCO','民间艺术','镂空']},
  {id:'mazu',name:'妈祖信俗',region:'福建·莆田',area:'华南',cat:'folklore',lon:119.01,lat:25.45,emoji:'🛕',img:'',desc:'妈祖信俗源自宋代福建莆田，以海上女神妈祖为崇拜对象。涵盖巡游、祭典、朝圣等丰富民俗活动，在沿海华人社会广泛流传。',tags:['UNESCO','海神信仰','闽台']},
  {id:'fushun-yange',name:'抚顺地秧歌',region:'辽宁·抚顺',area:'东北',cat:'dance',lon:124.00,lat:41.88,emoji:'💃',img:'',desc:'抚顺地秧歌是国家级非遗，火爆幽默尽显满族风情，以豪放粗犷的舞步和诙谐的表演风格著称于东北民间舞蹈之林。',tags:['国家级','秧歌','满族']},
  {id:'jingdezhen',name:'景德镇瓷器',region:'江西·景德镇',area:'华东',cat:'craft',lon:117.21,lat:29.27,emoji:'🏺',img:'https://images.unsplash.com/photo-1610701923232-a5676e2730de?auto=format&fit=crop&w=400&q=80',desc:'景德镇是中国的"千年瓷都"。其瓷器以"白如玉、明如镜、薄如纸、声如磬"著称。景德镇制瓷技艺环节繁杂，是中国工匠精神的体现。',tags:['千年瓷都','青花瓷','柴窑']},

function buildRiverSegments(coords) {
  let segments = [];
  for(let i=0; i<coords.length-1; i++) {
    let progress = Math.max(0.1, (i + 1) / coords.length); 
    segments.push({
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: [coords[i], coords[i+1]] },
      properties: { flow: progress }
    });
  }
  return segments;
}

const HOME = { center:[104,36], zoom:4.3, pitch:60, bearing:-12 };

const map = new maplibregl.Map({
  container: 'map',
  style: { version: 8, sources: {}, layers: [{ id:'bg', type:'background', paint:{'background-color':'#05070a'} }] },
  center: HOME.center, zoom: HOME.zoom, pitch: HOME.pitch, bearing: HOME.bearing,
  antialias: true, maxZoom: 15, minZoom: 2, maxPitch: 85, renderWorldCopies: true, projection: 'mercator'
});

document.getElementById('c-in').onclick = ()=>map.zoomIn({duration:600});
document.getElementById('c-out').onclick = ()=>map.zoomOut({duration:600});

let pitchState = 1; 
document.getElementById('c-tlt').onclick = () => {
  pitchState = (pitchState + 1) % 3;
  let p = 0, b = 0;
  if(pitchState === 1) { p = 60; b = -12; } 
  if(pitchState === 2) { p = 85; b = 45; }  
  map.easeTo({pitch: p, bearing: b, duration: 1200});
};

map.on('load', ()=>{
  map.addSource('dem',{ type:'raster-dem', tiles:['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'], encoding:'terrarium', tileSize:256, maxzoom:14 });
  map.setTerrain({source:'dem', exaggeration:2.5});
  map.addLayer({

      'circle-color': '#ff7b00',

      'circle-blur': 1.5,
      'circle-opacity': ['*', ['get', 'intensity'], ['interpolate', ['linear'], ['zoom'], 3, 0.1, 6, 0.5]]

  map.addLayer({
    id: 'lights-core', type: 'circle', source: 'city-lights', filter: ['==', ['get', 'core'], true],

    map.addSource('provs',{type:'geojson',data:provsGJ});

    map.addLayer({ id:'prov-line', type:'line', source:'provs', paint:{ 'line-color':'#fceabb', 'line-opacity':0.15, 'line-width':0.5 } });
  }).catch(console.warn);

  buildMarkers();
  
  setTimeout(()=>document.getElementById('loading').classList.add('out'), 1500);
});

function calcChinaBoxMinZoom(){
  const cvs=map.getCanvas(); if(!cvs) return 2;
  const YSPAN = Math.log(Math.tan(Math.PI/4+58*Math.PI/360)) - Math.log(Math.tan(Math.PI/4+10*Math.PI/360));
  return Math.max(Math.log2(cvs.clientWidth*360/(512*80)), Math.log2(cvs.clientHeight*2*Math.PI/(512*YSPAN)));
}
setTimeout(()=>map.setMinZoom(calcChinaBoxMinZoom()), 500);
window.addEventListener('resize', ()=>map.setMinZoom(calcChinaBoxMinZoom()));

/* ═══════════════════════════════════════════════════
   极简花灯与逻辑
═══════════════════════════════════════════════════ */
const markers=[];

function buildMarkers(){
  HERITAGE.forEach(item=>{
    const el=document.createElement('div');
    el.className='hm';
    el.onmouseenter = () => el.style.zIndex = 100;
    el.onmouseleave = () => el.style.zIndex = 1;

    el.innerHTML=`
<div class="hm-scale">
  <div class="hm-pin">
    <div class="lantern-body">
      <div class="l-emoji">${item.emoji}</div>
      <div class="l-name">${item.name}</div>
    </div>
  </div>
</div>`;

    el.addEventListener('click', (ev) => { ev.stopPropagation(); flyLanternToCenter(item, el); });
    const marker=new maplibregl.Marker({element:el, anchor:'bottom', offset:[0,0]}).setLngLat([item.lon,item.lat]).addTo(map);
    marker._visible=true;
    markers.push({el,marker,item});
  });
  
  applyScale(); updateMarkers();
}

function applyScale(){ 
  const z = map.getZoom();
  const scale = Math.max(0.6, Math.min(1.2, 0.6 + (z - 4.5) * 0.2));
  document.documentElement.style.setProperty('--marker-scale', scale.toFixed(3)); 
}

let filterCat='', filterArea='';
document.querySelectorAll('.fb-pill').forEach(pill=>{
  pill.addEventListener('click', () => {
    const type = pill.dataset.filter, val = pill.dataset.val;
    document.querySelectorAll(`.fb-pill[data-filter="${type}"]`).forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    if(type==='cat') filterCat = val; else filterArea = val;
    updateMarkers(); 
  });
});

function updateMarkers(){
  const z = map.getZoom();
  const hasFilter = filterCat !== '' || filterArea !== '';
  markers.forEach(({marker,item})=>{
    const passCat = !filterCat || item.cat === filterCat;
    const passArea = !filterArea || item.area === filterArea;
    let passZoom = false;
    if (hasFilter) { passZoom = true; } 
    else {
      if (z < 5.5) passZoom = (item.tier === 1);
      else if (z < 7.2) passZoom = (item.tier <= 2);
      else passZoom = true; 
    }
    const show = passCat && passArea && passZoom;
    if(show && !marker._visible){ marker.addTo(map); marker._visible = true; }
    else if(!show && marker._visible){ marker.remove(); marker._visible = false; }
  });
}

map.on('zoom', ()=>{ applyScale(); updateMarkers(); });

/* ═══════════════════════════════════════════════════
   极致动画：飞入眼帘
═══════════════════════════════════════════════════ */
const flyOverlay = document.getElementById('fly-overlay');
const heroLantern = document.getElementById('hero-lantern');
let activeItem = null;

function flyLanternToCenter(item, sourceElement) {
  activeItem = item;
  const rect = sourceElement.getBoundingClientRect();
  
  document.getElementById('hc-emoji').textContent = item.emoji;
  document.getElementById('hc-name').textContent = item.name;
  document.getElementById('hc-region').textContent = item.region;
  document.getElementById('hc-desc').textContent = item.desc;
  document.getElementById('hc-cat').textContent = CAT_LABEL[item.cat];
  document.getElementById('hc-tags').innerHTML = (item.tags||[]).map(t=>`<span class="hc-tag">${t}</span>`).join('');
  
  const img = document.getElementById('hc-img');
  if(item.img) { img.style.display='block'; img.src=item.img; img.onerror=()=>img.style.display='none'; }
  else { img.style.display='none'; img.src=''; }

  const currentScale = getComputedStyle(document.documentElement).getPropertyValue('--marker-scale');
  
  heroLantern.classList.remove('flying');
  heroLantern.style.transition = 'none'; 
  heroLantern.style.left = (rect.left + rect.width / 2) + 'px';
  heroLantern.style.top = (rect.top + rect.height / 2) + 'px';
  heroLantern.style.transform = `translate(-50%, -50%) scale(${currentScale})`;

  void heroLantern.offsetWidth;

  flyOverlay.classList.add('active');
  heroLantern.style.transition = 'all 0.8s cubic-bezier(0.2, 1, 0.3, 1)'; 
  heroLantern.classList.add('flying');
  
  map.flyTo({center:[item.lon,item.lat], zoom:Math.max(map.getZoom(), 7.5), duration:1200});
}

function closeLantern() {
  if(!activeItem) return;
  heroLantern.classList.remove('flying');
  flyOverlay.classList.remove('active');
  activeItem = null;
  map.flyTo({...HOME, duration:1500});
}

document.getElementById('hc-close').addEventListener('click', closeLantern);
flyOverlay.addEventListener('click', (e) => { if(e.target === flyOverlay) closeLantern(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLantern(); });

</script>
